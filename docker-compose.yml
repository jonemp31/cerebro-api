# cerebro-api — ambiente local (Docker Windows)
# Fase 0: só o Postgres (parrudo). O serviço "cerebro" entra na Fase 1.
services:

  # ── PostgreSQL (dedicado ao cerebro-api) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cerebro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cerebro}
      POSTGRES_DB: ${POSTGRES_DB:-cerebro}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"      # 5433 no host p/ não colidir com o Postgres da api-escala
    volumes:
      - cerebro_pg:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro  # aplica o schema no 1º boot
    # ── Tuning "parrudo" (folgado p/ milhares de leads; pro seu volume é sobra) ──
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_compression=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cerebro} -d ${POSTGRES_DB:-cerebro}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  # ── cerebro (o orquestrador) ─────────────────────────────────────────────────
  cerebro:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8090"            # /webhook/wa e /webhook/pay
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cerebro}:${POSTGRES_PASSWORD:-cerebro}@postgres:5432/${POSTGRES_DB:-cerebro}?sslmode=disable
      API_ESCALA_URL: http://host.docker.internal:3000   # a api-escala rodando local
      LISTEN_ADDR: ":8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  cerebro_pg:
